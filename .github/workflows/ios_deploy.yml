name: iOS — Build & Deploy TestFlight

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Upload to TestFlight
    runs-on: macos-latest

    steps:
      # 1. Récupérer le code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Installer Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      # 3. Installer les dépendances Dart/Flutter
      - name: Flutter pub get
        run: flutter pub get

      # 4. Écrire la clé API Apple (.p8) depuis les secrets GitHub
      - name: Write App Store Connect API Key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APP_STORE_API_KEY_CONTENT }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_KEY_ID }}.p8

      # 5. Créer l'Appfile Fastlane dynamiquement (gitignored, généré en CI)
      - name: Create Fastlane Appfile
        run: |
          cat > ios/fastlane/Appfile << EOF
          app_identifier "${{ secrets.BUNDLE_ID }}"
          team_id "${{ secrets.APPLE_TEAM_ID }}"
          EOF

      # 6. Installer Ruby + dépendances via Gemfile
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ios

      - name: Install Fastlane via Bundler
        run: bundle install
        working-directory: ios

      # 7. Installer les pods iOS
      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      # 7b. Purger les certificats DISTRIBUTION orphelins (évite "max certs reached")
      # Chaque build CI échoué crée un cert sans clé privée → quota bloqué
      - name: Purge orphan Distribution certificates
        env:
          APP_STORE_KEY_ID: ${{ secrets.APP_STORE_KEY_ID }}
          APP_STORE_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
          APP_STORE_API_KEY_CONTENT: ${{ secrets.APP_STORE_API_KEY_CONTENT }}
        run: |
          pip3 install PyJWT cryptography --quiet --break-system-packages
          python3 << 'PYEOF'
          import jwt, time, json, subprocess, os

          KEY_ID    = os.environ["APP_STORE_KEY_ID"]
          ISSUER_ID = os.environ["APP_STORE_ISSUER_ID"]
          PEM       = os.environ["APP_STORE_API_KEY_CONTENT"]

          token = jwt.encode(
              {"iss": ISSUER_ID, "exp": int(time.time()) + 1200, "aud": "appstoreconnect-v1"},
              PEM, algorithm="ES256", headers={"kid": KEY_ID}
          )

          def asc(method, path):
              cmd = ["curl", "-s", "--max-time", "30",
                     "-H", f"Authorization: Bearer {token}",
                     "-H", "Content-Type: application/json"]
              if method == "DELETE":
                  cmd += ["-X", "DELETE"]
              cmd.append(f"https://api.appstoreconnect.apple.com{path}")
              return subprocess.run(cmd, capture_output=True, text=True)

          resp = asc("GET", "/v1/certificates?limit=20")
          certs = json.loads(resp.stdout).get("data", [])
          dist = [c for c in certs if "DISTRIBUTION" in c["attributes"]["certificateType"]]
          print(f"Certs DISTRIBUTION trouvés : {len(dist)}")
          for c in dist:
              r = asc("DELETE", f"/v1/certificates/{c['id']}")
              print(f"  Supprimé {c['id']} ({c['attributes']['name']})")
          print("Quota libéré — cert(force:true) peut créer un cert propre.")
          PYEOF

      # 8. Build Flutter iOS (génère le code natif, sans signature)
      - name: Flutter build iOS
        run: flutter build ios --release --no-codesign

      # 9. Fastlane : keychain + signature + upload TestFlight
      - name: Fastlane release
        run: bundle exec fastlane ios release
        working-directory: ios
        env:
          APP_STORE_KEY_ID: ${{ secrets.APP_STORE_KEY_ID }}
          APP_STORE_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
          APP_STORE_API_KEY_PATH: ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_KEY_ID }}.p8
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          BUNDLE_ID: ${{ secrets.BUNDLE_ID }}
