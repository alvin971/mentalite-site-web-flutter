name: iOS — Build & Deploy TestFlight

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Upload to TestFlight
    runs-on: macos-latest

    steps:
      # 1. Récupérer le code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Installer Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      # 3. Installer les dépendances Dart/Flutter
      - name: Flutter pub get
        run: flutter pub get

      # 4. Écrire la clé API Apple (.p8) depuis les secrets GitHub
      - name: Write App Store Connect API Key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APP_STORE_API_KEY_CONTENT }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_KEY_ID }}.p8

      # 5. Créer l'Appfile Fastlane dynamiquement (gitignored, généré en CI)
      - name: Create Fastlane Appfile
        run: |
          cat > ios/fastlane/Appfile << EOF
          app_identifier "${{ secrets.BUNDLE_ID }}"
          team_id "${{ secrets.APPLE_TEAM_ID }}"
          EOF

      # 6. Installer Ruby + dépendances via Gemfile
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ios

      - name: Install Fastlane via Bundler
        run: bundle install
        working-directory: ios

      # 7. Installer les pods iOS
      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      # 8. Build Flutter iOS (génère le code natif, sans signature)
      - name: Flutter build iOS
        run: flutter build ios --release --no-codesign

      # 9. Fastlane : keychain + signature + upload TestFlight
      - name: Fastlane release
        run: bundle exec fastlane ios release
        working-directory: ios
        env:
          APP_STORE_KEY_ID: ${{ secrets.APP_STORE_KEY_ID }}
          APP_STORE_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
          APP_STORE_API_KEY_PATH: ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_KEY_ID }}.p8
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          BUNDLE_ID: ${{ secrets.BUNDLE_ID }}
